<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ARSDAVINCI Apps</title>
  <meta name="description" content="ARSDAVINCI apps support and information.">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f5f6f3;
      --panel: #ffffff;
      --text: #111814;
      --muted: #69716c;
      --accent: #2f8c6a;
      --line: rgba(17, 24, 20, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    main {
      width: min(880px, calc(100% - 40px));
      margin: 0 auto;
      padding: 64px 0 72px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(36px, 7vw, 58px);
      line-height: 1.05;
    }

    p { margin: 0 0 14px; }

    .lead {
      max-width: 680px;
      color: var(--muted);
      font-size: 18px;
    }

    .apps {
      display: grid;
      gap: 16px;
      margin-top: 32px;
    }

    .app {
      display: block;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      color: inherit;
      text-decoration: none;
    }

    .app strong {
      display: block;
      margin-bottom: 6px;
      font-size: 24px;
    }

    .app span { color: var(--muted); }

    .app:hover strong { color: var(--accent); }

    footer {
      margin-top: 36px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <h1>ARSDAVINCI Apps</h1>
    <p class="lead">Support pages and app information for ARSDAVINCI apps.</p>

    <div class="apps">
      <a class="app" href="https://arsdavinci.github.io/clientnote-support/subscnote.html">
        <strong>Subsc Note</strong>
        <span>Subscription and recurring payment management app support.</span>
      </a>
    </div>

    <footer>
      <p>© 2026 ARSDAVINCI</p>
    </footer>
  </main>
</body>
</html>
